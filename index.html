<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidoSegurosLogisticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="conteiner-fluid">
         <nav class="navbar navbar-expand-md mb-3"></nav>
          <div class="row">
             <h1 class="col-12 col-sm-9 col-md-3 mx-auto w-25 mt-3 text-black">Login</h1>
        </div>
        <div class="conteiner-fluid">

            
    </header>
     <main class="mt-3 content">
         <section id="formularioCadastroProdutos">
           
            
            <form action="#" method="post" class="card border-10 text-center col-12 col-md-6 col-lg-12 mx-auto w-25 mt-5 text-black ">


                <label for="#email">Email</label>
                <input type="text" name="emailUsuario" required><br>

                <label for="#senha" class="mt-2">Senha</label>
                <input type="text" name="senhaUsuario" required><br>

                <button type="submit" class="btn btn-primary">Entrar</button>

                <div>
                    <a href="#senha" class="mx-auto w-25 mt-3">Esqueci Minha Senha</a>
                </div>
                
            </form>

        </section>


     </main>

      <footer class="mt-5">
        <p>©Todos os direitos reservados</p>
    </footer>
    
</body>
</html>
