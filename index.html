<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidoSegurosLogisticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <header class="container-fluid">
        <!--Link da imagem de logo-->
           <img src="image - Editado.png" class="img-fluid" style="max-width: 80px" alt="Logo">
            
    </header>
    <!-- Conteúdo principal -->
    <main class="container">
        <!-- Linha centralizada -->
        <div class="row justify-content-center">
            
            <!-- Coluna responsiva (se adapta ao tamanho da tela) -->
            <div class="col-12 col-sm-8 col-md-5 col-lg-4">

                <!-- Título da página -->
                <h1 class="text-center mt-4 mb-4">Login</h1>

                <!-- Formulário de login -->
                <form class="card p-4 shadow">

                    <!-- Campo de Email -->
                    <div class="mb-3 text-start">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required> <!-- Campo obrigatório -->
                    </div>

                    <!-- Campo de Senha-->
                    <div class="mb-3 text-start">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" id="senha" class="form-control" required> <!-- Campo obrigatório -->
                    </div>

                    <!-- Botão de envio do formulário (Entrar)-->
                    <button type="submit" class="btn btn-primary w-100">
                        Entrar
                    </button>

                    <!-- Link para recuperação de senha (Só para ser visual) -->
                    <div class="text-center mt-3">
                        <a href="#">Esqueci minha senha</a>
                    </div>

                </form>

            </div>
        </div>
    </main>

      <!-- Rodapé da página  reservando os direitos-->
      <footer class="text-muted text-center mt-5">
        <p>©Todos os direitos reservados</p>
    </footer>
    
</body>
</html>
